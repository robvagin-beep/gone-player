name: Full Audit — 5 Agents + Synthesis + Auto-Loop

# Runs a comprehensive multi-agent audit, then loop_audit.py picks up the
# findings comment and implements fixes automatically.
# Self-healing cycle: audit → fix → PR → audit again on fixed code → repeat.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post results to (default: 1)'
        required: false
        default: '1'

  # Auto-trigger on any new PR targeting dev (includes loop/fix-* branches)
  pull_request:
    types: [opened]
    branches: [dev]

  # Also trigger on direct pushes to dev with Swift changes
  push:
    branches: [dev]
    paths:
      - 'GONE/**/*.swift'

jobs:
  full-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install anthropic

      - name: Run full multi-agent audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number || '1' }}
          REPO: ${{ github.repository }}
        run: python full_audit.py
