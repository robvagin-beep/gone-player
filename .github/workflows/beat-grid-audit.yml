name: Beat-Grid Overlay Audit

# Runs automatically when WaveformView changes land in a PR,
# or manually against any PR number via workflow_dispatch.
# Delegates analysis to claude-opus-4-7 on Anthropic infrastructure.

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'GONE/WaveformView.swift'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to audit'
        required: true
        default: '1'

jobs:
  beat-grid-audit:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install anthropic

      - name: Run beat-grid audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/beat_grid_audit.py
