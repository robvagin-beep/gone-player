name: Audit Loop — Auto-iterate on findings

# Triggers when github-actions[bot] posts an audit result to the PR.
# Reads the latest bot comment, sends it back to Anthropic as a follow-up
# prompt, and posts the next-action plan or code fix as a new PR comment.

on:
  issue_comment:
    types: [created]

jobs:
  loop:
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'github-actions[bot]' &&
      contains(github.event.comment.body, 'Claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install anthropic

      - name: Run audit loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          AUDIT_COMMENT: ${{ github.event.comment.body }}
        run: python loop_audit.py
