name: Audit Loop — Analyse, validate, implement, open PR

on:
  issue_comment:
    types: [created]

jobs:
  loop:
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'github-actions[bot]' &&
      contains(github.event.comment.body, 'Claude') &&
      !contains(github.event.comment.body, '🔁 Loop') &&
      !contains(github.event.comment.body, 'Loop PR opened')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      pull-requests: write
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install anthropic

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run audit loop — analyse, validate, implement, open PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          AUDIT_COMMENT: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: python loop_audit.py
